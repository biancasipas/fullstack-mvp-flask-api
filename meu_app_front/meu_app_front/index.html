<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema de Pacientes</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">

        <!-- HEADER -->
        <header>
            <h1>Sistema de Pacientes</h1>
            <p>Cadastro e gerenciamento de pacientes</p>
        </header>

        <!-- FORM -->
        <section class="form">
            <div>
                <label>Nome:</label>
                <input type="text" id="nome">
            </div>

            <div>
                <label>Idade:</label>
                <input type="number" id="idade">
            </div>

            <div>
                <label>Peso:</label>
                <input type="number" step="0.1" id="peso">
            </div>

            <button onclick="criarPaciente()">Cadastrar</button>
        </section>

        <!-- LISTA -->
        <section>
            <h2>Pacientes</h2>

            <table id="tabela">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Idade</th>
                        <th>Peso</th>
                        <th>Ação</th>
                    </tr>
                </thead>

                <tbody id="listaPacientes">
                </tbody>
            </table>
        </section>

    </div>

    <script src="scripts.js"></script>
</body>
</html>
