<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema de Pacientes</title>

    <style>
        body {
            margin: 0;
            color: #fff;
            font-family: sans-serif;
            background: url(https://www.grupomedcof.com.br/blog/wp-content/uploads/2024/07/Blog-MedCof-26-2-1024x576.png) no-repeat center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 900px;
            background: rgba(40, 57, 101, 0.92);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        header p {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }

        .form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .form div {
            display: flex;
            flex-direction: column;
            width: 60%;
        }

        input {
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            outline: none;
        }

        button {
            padding: 12px 25px;
            background: #1161ee;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0d4edb;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(6px);
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.05);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body>

<div class="container">

    <header>
        <h1>Sistema de Pacientes</h1>
        <p>Cadastro e gerenciamento de pacientes</p>
    </header>

    <section class="form">
        <div>
            <label>Nome:</label>
            <input type="text" id="nome">
        </div>

        <div>
            <label>Idade:</label>
            <input type="number" id="idade">
        </div>

        <div>
            <label>Peso:</label>
            <input type="number" step="0.1" id="peso">
        </div>

        <button onclick="criarPaciente()">Cadastrar</button>
    </section>

    <section>
        <h2>Pacientes</h2>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Idade</th>
                    <th>Peso</th>
                    <th>Ação</th>
                </tr>
            </thead>

            <tbody id="listaPacientes"></tbody>
        </table>
    </section>

</div>

<script>
const API_URL = "http://127.0.0.1:5000";

const getList = () => {
    fetch(`${API_URL}/paciente`)
        .then(res => res.json())
        .then(data => {
            const tabela = document.getElementById("listaPacientes");
            tabela.innerHTML = "";

            data.pacientes.forEach(p => insertList(p));
        })
        .catch(err => console.error(err));
};

const postItem = (nome, idade, peso) => {
    const data = {
        nome: nome.trim(),
        idade: parseInt(idade),
        peso: parseFloat(peso)
    };

    if (!data.nome || isNaN(data.idade) || isNaN(data.peso)) {
        alert("Preencha corretamente!");
        return;
    }

    fetch(`${API_URL}/paciente_json`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(res => {
        if (!res.ok) {
            alert("Erro ao criar paciente");
            return;
        }
        getList();
    })
    .catch(console.error);
};

const deleteItem = (id) => {
    fetch(`${API_URL}/paciente/${id}`, {
        method: "DELETE"
    })
    .then(res => {
        if (!res.ok) {
            alert("Erro ao deletar");
            return;
        }
        getList();
    })
    .catch(console.error);
};

const insertList = (p) => {
    const tabela = document.getElementById("listaPacientes");
    const row = tabela.insertRow();

    row.insertCell(0).innerHTML = p.nome;
    row.insertCell(1).innerHTML = p.idade;
    row.insertCell(2).innerHTML = p.peso;

    row.insertCell(3).innerHTML =
        `<button onclick="deleteItem(${p.id})">X</button>`;
};

const criarPaciente = () => {
    const nome = document.getElementById("nome").value;
    const idade = document.getElementById("idade").value;
    const peso = document.getElementById("peso").value;

    if (!nome || !idade || !peso) {
        alert("Preencha todos os campos!");
        return;
    }

    postItem(nome, idade, peso);

    document.getElementById("nome").value = "";
    document.getElementById("idade").value = "";
    document.getElementById("peso").value = "";
};

window.onload = () => {
    getList();
};
</script>

</body>
</html>
