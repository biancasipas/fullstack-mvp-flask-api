<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema de Pacientes</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <div class="container">
     <!-- Cabeçalho de informações do sistema -->
    <header>
    <div class="title">
        <h1>Sistema de Pacientes</h1>
        <p class="descricao">
            Cadastro e gerenciamento de pacientes do sistema
        </p>
    </div>
    </header>

     <!-- Opções para adicionar um novo item -->
    <section class="newItem">

    <div class="campo">
    <label>Nome do paciente:</label>
    <input type="text" id="newInput">
    </div>

    <div class="campo">
    <label>Data de Registro:</label>
    <input type="text" id="newPrice">
    </div>

    <div class="campo">
    <label>CPF:</label>
    <input type="text" id="newQuantity">
    </div>

    <button onclick="newItem()" class="addBtn">Adicionar</button>

</section>

    <!-- Tabela com items existentes -->
    <section class="items">
        <table id="myTable">
            <tr>
                <th>Nome</th>
                <th>CPF</th>
                <th>Data de Registro</th>
                <th><img src="https://cdn-icons-png.flaticon.com/512/126/126468.png" width="15px" height="15px"></th>
            </tr>
        </table>
    </section>

    <script src="scripts.js"></script>
    </div>
</body>

</html>
